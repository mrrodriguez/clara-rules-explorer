name: Server CI

on:
  push:
    branches: [ main ]
    paths:
      - 'server/**'
      - '.github/workflows/server.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'server/**'
      - '.github/workflows/server.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Clojure
        uses: DeLaGuardo/setup-clojure@13.6.1
        with:
          cli: 1.12.5.1654
          github-token: ${{ github.token }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: ${{ runner.os }}-clojure-${{ hashFiles('server/deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-clojure-

      - name: Run Tests
        run: clojure -M:test:run-tests

      - name: Reflection Check
        run: ./bin/ci/check-reflection.sh
