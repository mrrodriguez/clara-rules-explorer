name: UI CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm lint

      - name: Check (Types & Svelte)
        run: pnpm check

      - name: Unit Tests
        run: pnpm test:unit --run

  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Clojure
        uses: DeLaGuardo/setup-clojure@13.6.1
        with:
          cli: 1.12.5.1654
          github-token: ${{ github.token }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Install UI dependencies
        working-directory: ui
        run: pnpm install

      - name: Install Playwright Browsers
        working-directory: ui
        run: pnpm exec playwright install --with-deps

      - name: Build UI
        working-directory: ui
        run: pnpm build

      - name: Prepare Demo Session
        working-directory: server
        run: clojure -M:demo-setup

      - name: Start Backend Server
        working-directory: server
        run: |
          mkdir -p target
          clojure -M:demo-run -s demo-data/session.bin > target/backend.log 2>&1 &
        # demo-run now defaults to port 9001 which UI expects

      - name: Wait for Backend
        run: ui/bin/ci/wait-for-backend.sh http://localhost:9001/v1/rulebase-summary 60 server/target/backend.log

      - name: Run E2E Tests
        working-directory: ui
        run: pnpm test:e2e

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: ui/playwright-report/
          retention-days: 30
